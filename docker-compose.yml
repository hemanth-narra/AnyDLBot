version: "3.9"

services:
  anydlbot:
    build: .
    container_name: anydlbot
    restart: unless-stopped
    environment:
      # в”Ђв”Ђ Required в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - TG_BOT_TOKEN=${TG_BOT_TOKEN}
      - APP_ID=${APP_ID}
      - API_HASH=${API_HASH}
      # в”Ђв”Ђ Optional в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - AUTH_USERS=${AUTH_USERS:-}
      - BANNED_USERS=${BANNED_USERS:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - CHUNK_SIZE=${CHUNK_SIZE:-128}
      - DEF_THUMB_NAIL_VID_S=${DEF_THUMB_NAIL_VID_S:-}
      # Set WEBHOOK=1 to load sample_config.py instead of config.py
      - WEBHOOK=1
    volumes:
      # Persist downloaded/uploaded files across container restarts
      - ./DOWNLOADS:/app/DOWNLOADS
